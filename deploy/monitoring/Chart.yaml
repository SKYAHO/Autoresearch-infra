# #183 monitoring 스택 umbrella chart — ArgoCD가 이 경로를 source로 배포한다.
# kube-prometheus-stack을 dependency로 감싸 버전 pin과 values를 한곳에서 관리한다.
# (Terraform helm_release에서 ArgoCD Application으로 이관 — GitOps 파일럿)
# ArgoCD가 sync 시 `helm dependency build`를 자동 수행하므로 charts/를 vendor하지 않는다.
apiVersion: v2
name: autoresearch-monitoring
description: AutoResearch dev 모니터링 스택(kube-prometheus-stack) umbrella chart
type: application
version: 0.1.0
appVersion: "87.12.1"

dependencies:
  - name: kube-prometheus-stack
    version: 87.12.1
    repository: https://prometheus-community.github.io/helm-charts
