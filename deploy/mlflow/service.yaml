# #94 MLflow UI/API. ClusterIP = 내부 전용(외부 노출 금지). 접근은 port-forward
# 또는 후속으로 내부 ILB. 외부 LoadBalancer/Ingress를 만들지 않는다.
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlflow
  labels:
    app.kubernetes.io/name: mlflow
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mlflow
  ports:
    - name: http
      port: 5000
      targetPort: http
