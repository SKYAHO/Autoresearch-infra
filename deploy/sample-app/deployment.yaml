# #208 ArgoCD 임의 워크로드 실배포 검증용 임시 샘플. 검증 후 제거한다.
# ArgoCD가 이 plain 매니페스트(helm 아님)를 git에서 sync 배포하는 경로를 실증한다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  labels:
    app: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
