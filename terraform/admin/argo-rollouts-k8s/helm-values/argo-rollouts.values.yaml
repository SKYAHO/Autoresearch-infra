# #88 Argo Rollouts dev values. 설계: #87 spec.
# - controller만 설치 (dashboard 미설치 — kubectl plugin으로 운영, #90 runbook)
# - notifications/metrics 연동은 후속 (2단계 metric 판단 설계 시)

dashboard:
  enabled: false

controller:
  replicas: 1

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
