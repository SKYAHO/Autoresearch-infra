# Issue #79에서 사용할 기본 values 위치입니다.
# 이 파일 자체만으로 Prometheus/Grafana가 설치되지는 않습니다.
# 실제 password, token, OAuth secret 값은 이 파일에 넣지 않습니다.

prometheus:
  prometheusSpec:
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 30Gi

grafana:
  enabled: true
  service:
    type: ClusterIP
  persistence:
    enabled: true
    size: 10Gi

alertmanager:
  enabled: true

prometheusOperator:
  internalPort: 10250
  admissionWebhooks:
    enabled: true
