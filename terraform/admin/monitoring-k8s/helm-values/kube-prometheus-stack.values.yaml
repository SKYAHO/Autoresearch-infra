# Issue #79에서 사용할 기본 values 위치입니다.
# 이 파일 자체만으로 Prometheus/Grafana가 설치되지는 않습니다.
# 실제 password, token, OAuth secret 값은 이 파일에 넣지 않습니다.

prometheus:
  prometheusSpec:
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          # standard(pd-standard, HDD): 기본 standard-rwo(pd-balanced)는
          # SSD_TOTAL_GB quota(리전 250GB, #98 인시던트와 동일)에 막힌다.
          # dev 관측 워크로드에는 HDD IOPS로 충분.
          storageClassName: standard
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 30Gi

grafana:
  enabled: true
  service:
    type: ClusterIP
  persistence:
    enabled: true
    size: 10Gi
    # SSD quota 회피 — Prometheus PVC와 동일 근거 (#79/#98)
    storageClassName: standard

alertmanager:
  enabled: true

prometheusOperator:
  internalPort: 10250
  admissionWebhooks:
    enabled: true
