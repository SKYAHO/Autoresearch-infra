# #134 Vault dev values. 설계: docs/superpowers/specs/2026-07-12-vault-dev-design.md
# - standalone 1 replica + integrated Raft (HA 확장 경로 유지, 비용 최소)
# - gcpckms auto-unseal: KMS key/GSA는 dev root vault.tf(#132)가 관리
# - ClusterIP + port-forward 전용. TLS는 1단계 비활성(실 secret 이관 전 활성화 필수)
# - secret payload는 이 파일/Terraform에 저장하지 않는다

global:
  # dev 1단계: 클러스터 내부 + port-forward 한정 평문. NetworkPolicy로 격리.
  # #177 하드 게이트: consumer가 없어 현재 노출 표면은 vault ns 내부 국한.
  # 실 secret 이관 전 tlsDisable=false + cert 회전 자동화가 필수(runbook
  # "하드 게이트" 절). 이 값을 false로만 바꾸면 cert 없이 기동 실패하므로
  # TLS 활성화는 인증서 체계 설계(별도 이슈)와 함께 진행한다.
  tlsDisable: true

# agent injector는 1단계 범위 밖(최소 설치). 필요 시 별도 이슈에서 활성화.
injector:
  enabled: false

server:
  # #170 stateful(Raft PVC)은 dev-default 고정(#105 원칙)
  nodeSelector:
    cloud.google.com/gke-nodepool: dev-default

  # 최초 설치 시 vault-0은 operator init 전까지 uninitialized 상태라 기본
  # readiness(vault status)가 통과하지 않고, helm wait(atomic)가 timeout으로
  # 실패해 release가 purge된다(리뷰 지적). uninitcode=204만 2xx로 두어
  # 미초기화 pod를 Ready로 취급하고, sealed(503)는 기본값을 유지해 KMS
  # unseal 실패는 여전히 NotReady로 드러나게 한다.
  readinessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true&uninitcode=204"

  # 주의: 아래 GSA annotation과 seal "gcpckms"의 project/key 값은 dev root
  # #132 리소스에 대한 고정 값이다. values는 file()로 정적 로드되므로
  # var.project_id와 무관하다 — 다른 project로 재구성 시 이 파일을 직접
  # 수정해야 한다(README 참조).
  # chart가 KSA를 생성한다. 이름(release name = vault)과 annotation이
  # dev root WI 바인딩(vault/vault → autoresearch-dev-vault GSA)과 일치해야 한다.
  serviceAccount:
    create: true
    name: vault
    annotations:
      iam.gke.io/gcp-service-account: autoresearch-dev-vault@ar-infra-501607.iam.gserviceaccount.com

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      memory: 512Mi

  # Raft 데이터. 삭제 시 Vault 데이터 소실(1단계는 학습용 secret만).
  dataStorage:
    enabled: true
    size: 10Gi

  # file audit device용 (활성화 절차는 runbook)
  auditStorage:
    enabled: true
    size: 5Gi

  service:
    type: ClusterIP

  # single-node integrated Raft + KMS auto-unseal.
  # replicas를 늘리기 전에 raft join/anti-affinity 구성을 별도 이슈로 설계한다.
  ha:
    enabled: true
    replicas: 1
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
        }

        storage "raft" {
          path = "/vault/data"
        }

        seal "gcpckms" {
          project    = "ar-infra-501607"
          region     = "asia-northeast3"
          key_ring   = "autoresearch-dev-vault"
          crypto_key = "vault-unseal"
        }

        service_registration "kubernetes" {}

ui:
  enabled: true
  serviceType: ClusterIP
