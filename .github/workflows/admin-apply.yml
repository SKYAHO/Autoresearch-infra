# #307/#312 admin root(terraform/admin/*) gated 일괄 apply.
# 운영자가 수동 트리거 → 전 root plan 요약 → GitHub Environment(admin-apply) 승인
# → 전 root 순차 apply. 민감 tfvars(allowlist 이메일)는 로컬 tfvars가 아니라 GitHub
# Secrets 단일 원천에서 온다(#305 재발 방지). OAuth client secret 등 K8s Secret
# payload는 operator가 별도 주입한다(terraform 밖).
#
# 공개 저장소(#211): plan/apply 원문(허용 이메일 등 속성값)을 공개 로그·artifact에
# 노출하지 않는다. 출력은 파일로 리다이렉트하고 요약(리소스 헤더/Plan: 라인)만
# STEP_SUMMARY에, plan 바이너리는 private state 버킷으로 job 간 전달한다.
name: admin-apply

on:
  workflow_dispatch: {}

permissions:
  id-token: write # GitHub OIDC → GCP WIF
  contents: read

concurrency:
  group: admin-apply
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  # apply 순서: 의존성 고려(namespace 소유 root 먼저, argocd는 다른 namespace를
  # 참조하므로 마지막). gke-team-access는 제외한다(#314): 프로젝트 IAM 외에
  # BigQuery dataset·Artifact Registry repo IAM까지 관리해 apply SA에 bigquery.admin
  # + artifactregistry.admin까지 필요한 과도한 escalation이라, 사람 IAM은 로컬
  # break-glass로 유지한다.
  ROOTS: "autoresearch-k8s airflow-k8s monitoring-k8s elastic-k8s vault-k8s mlflow-k8s argo-rollouts-k8s argocd-k8s"
  PLAN_PREFIX: gs://autoresearch-dev-tfstate/admin-apply-plans
  # allowlist: 삭제 시 접근이 상실되는 값은 '|| []' 폴백을 두지 않는다. Secret
  # 미설정/빈 값이면 빈 문자열이 되어 terraform이 halt한다(#305류 차단). optional
  # (readonly, training_image_ar_writer)은 폴백을 둔다.
  TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
  # autoresearch-k8s·mlflow-k8s가 Cloud SQL private services CIDR을 required로 쓴다
  # (default 없음). dev root와 동일 Variable에서 주입.
  TF_VAR_private_services_cidr: ${{ vars.PRIVATE_SERVICES_CIDR }}
  TF_VAR_argocd_admin_user_emails: ${{ secrets.ARGOCD_ADMIN_USER_EMAILS }}
  TF_VAR_argocd_readonly_user_emails: ${{ secrets.ARGOCD_READONLY_USER_EMAILS || '[]' }}
  TF_VAR_argocd_server_url: ${{ vars.ARGOCD_SERVER_URL || 'https://localhost:8443' }}
  TF_VAR_autoresearch_viewer_user_emails: ${{ secrets.AUTORESEARCH_VIEWER_USER_EMAILS }}
  TF_VAR_installer_user_emails: ${{ secrets.AIRFLOW_INSTALLER_USER_EMAILS }}
  TF_VAR_monitoring_port_forward_user_emails: ${{ secrets.MONITORING_PORT_FORWARD_USER_EMAILS }}
  TF_VAR_mlflow_viewer_user_emails: ${{ secrets.MLFLOW_VIEWER_USER_EMAILS }}

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_ID }}
          service_account: ${{ vars.ADMIN_APPLY_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.5

      # #305 방어: 삭제 시 접근 상실되는 allowlist Secret이 비면 apply 자체를 막는다.
      - name: Guard required allowlist secrets
        env:
          A1: ${{ secrets.ARGOCD_ADMIN_USER_EMAILS }}
          A2: ${{ secrets.AUTORESEARCH_VIEWER_USER_EMAILS }}
          A3: ${{ secrets.AIRFLOW_INSTALLER_USER_EMAILS }}
          A4: ${{ secrets.MONITORING_PORT_FORWARD_USER_EMAILS }}
          A5: ${{ secrets.MLFLOW_VIEWER_USER_EMAILS }}
        run: |
          missing=""
          [ -z "$A1" ] && missing="$missing ARGOCD_ADMIN_USER_EMAILS"
          [ -z "$A2" ] && missing="$missing AUTORESEARCH_VIEWER_USER_EMAILS"
          [ -z "$A3" ] && missing="$missing AIRFLOW_INSTALLER_USER_EMAILS"
          [ -z "$A4" ] && missing="$missing MONITORING_PORT_FORWARD_USER_EMAILS"
          [ -z "$A5" ] && missing="$missing MLFLOW_VIEWER_USER_EMAILS"
          if [ -n "$missing" ]; then
            echo "::error::allowlist Secret 미설정:$missing — 빈 값으로 apply하면 해당 접근이 삭제됩니다(#305). 설정 후 재실행하세요."
            exit 1
          fi

      - name: Plan all roots
        run: |
          mask='s/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+/<email>/g'
          for root in $ROOTS; do
            d="terraform/admin/$root"
            echo "::group::plan $root"
            terraform -chdir="$d" init -input=false -no-color > "$d/step.txt" 2>&1 || { echo "::error::$root init 실패"; grep -iE "error" "$d/step.txt" | sed -E "$mask" | head -20; exit 1; }
            set +e
            terraform -chdir="$d" plan -input=false -no-color -out=tfplan.bin > "$d/plan.txt" 2>&1
            rc=$?
            set -e
            {
              echo "### $root"
              echo '```text'
              grep -E '^[[:space:]]*# .+ (will be|must be) |^Plan: [0-9]|^No changes\.' "$d/plan.txt" || echo '(요약 없음)'
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            if [ "$rc" -ne 0 ]; then
              echo "::error::$root plan 실패(rc=$rc):"
              grep -iE "error|denied|forbidden|refused|cannot|failed" "$d/plan.txt" | sed -E "$mask" | head -30
              exit "$rc"
            fi
            gcloud storage cp "$d/tfplan.bin" "$PLAN_PREFIX/$root/${{ github.run_id }}.tfplan"
            echo "::endgroup::"
          done

  apply:
    needs: plan
    runs-on: ubuntu-latest
    environment: admin-apply
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_ID }}
          service_account: ${{ vars.ADMIN_APPLY_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.5

      - name: Apply all roots
        run: |
          mask='s/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+/<email>/g'
          for root in $ROOTS; do
            d="terraform/admin/$root"
            echo "::group::apply $root"
            terraform -chdir="$d" init -input=false -no-color > "$d/step.txt" 2>&1 || { echo "::error::$root init 실패"; exit 1; }
            gcloud storage cp "$PLAN_PREFIX/$root/${{ github.run_id }}.tfplan" "$d/tfplan.bin"
            set +e
            terraform -chdir="$d" apply -input=false -no-color tfplan.bin > "$d/apply.txt" 2>&1
            rc=$?
            set -e
            if [ "$rc" -ne 0 ]; then
              echo "::error::$root apply 실패(rc=$rc):"
              grep -iE "error" "$d/apply.txt" | sed -E "$mask" | head -30
              exit "$rc"
            fi
            echo "$root: $(grep -E '^Apply complete' "$d/apply.txt" | sed -E "$mask")" >> "$GITHUB_STEP_SUMMARY"
            echo "::endgroup::"
          done

      - name: Cleanup plans
        if: always()
        run: |
          for root in $ROOTS; do
            gcloud storage rm "$PLAN_PREFIX/$root/${{ github.run_id }}.tfplan" || true
          done
