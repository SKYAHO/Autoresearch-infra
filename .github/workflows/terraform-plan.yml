name: Terraform Plan

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # dev root, 재사용 module, 또는 이 workflow 변경 시에만 실행 — 문서만
    # 바꾼 PR에서 GCP 인증/plan/댓글 낭비 방지. admin root는 의도적으로 제외:
    # 별도 state이며 팀원 개인 이메일이 plan 댓글에 노출되지 않게 로컬 plan만 사용.
    paths:
      - "terraform/envs/dev/**"
      - "terraform/modules/**"
      - ".github/workflows/terraform-plan.yml"

permissions:
  id-token: write        # GitHub OIDC 토큰 발급 (GCP WIF 인증)
  contents: read         # 코드 체크아웃
  pull-requests: write   # PR 댓글 게시

jobs:
  plan:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_ID }}
          service_account: ${{ vars.CI_SA_EMAIL }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # backend 없이 init (fmt/validate 용)
      - run: terraform -chdir=terraform/envs/dev init -backend=false
      - run: terraform -chdir=terraform/envs/dev fmt -recursive -check -no-color
      - run: terraform -chdir=terraform/envs/dev validate -no-color

      # backend 포함 init (plan 용, state 참조)
      - run: terraform -chdir=terraform/envs/dev init -reconfigure -no-color

      - name: terraform plan
        id: plan
        continue-on-error: true
        env:
          # tfvars 가 gitignored 라 CI에 변수값이 없다. GitHub variables 에서 주입.
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_dev_subnet_cidr: ${{ vars.DEV_SUBNET_CIDR }}
          TF_VAR_labels: ${{ vars.TF_LABELS_JSON || '{}' }}
          TF_VAR_private_services_cidr: ${{ vars.PRIVATE_SERVICES_CIDR }}
          TF_VAR_gke_master_ipv4_cidr: ${{ vars.GKE_MASTER_IPV4_CIDR }}
          TF_VAR_gke_pods_cidr: ${{ vars.GKE_PODS_CIDR }}
          TF_VAR_gke_services_cidr: ${{ vars.GKE_SERVICES_CIDR }}
          TF_VAR_master_authorized_networks: ${{ vars.MASTER_AUTHORIZED_NETWORKS || '[]' }}
        # plan 원문은 runner 임시파일에만 둔다(공개 PR 코멘트에 게시 금지).
        # 공개 코멘트에는 리소스 주소 헤더 + 요약만 게시하므로, 여기서 안전한
        # 요약(속성 diff 라인 제외 = 값 노출 없음)을 추출해 둔다.
        run: |
          set -o pipefail
          terraform -chdir=terraform/envs/dev plan -no-color -input=false > /tmp/plan.out 2>&1
          # allowlist: '# <addr> will be/must be ...' 리소스 주소 헤더와
          # 'Plan:'/'No changes' 요약 라인만. 속성값/오류 텍스트는 포함하지 않는다.
          grep -E '^[[:space:]]*# .+ (will be|must be) |^Plan: [0-9]|^No changes\.' \
            /tmp/plan.out > /tmp/plan.summary || true

      - name: PR 댓글 게시
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const fs = require('fs');
            const outcome = process.env.PLAN_OUTCOME;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let body;
            if (outcome === 'success') {
              let summary = '';
              try { summary = fs.readFileSync('/tmp/plan.summary', 'utf8').trim(); } catch (e) {}
              if (!summary) summary = '(변경 요약 없음 — No changes 이거나 요약 추출 실패)';
              // 방어적 상한. 요약 라인은 리소스 주소뿐이라 값 노출은 없다.
              body = [
                '### Terraform Plan — ✅ plan success',
                '',
                '변경 요약(리소스 주소·action). 상세 diff는 Actions 로그 참조 — 원문 plan은 공개하지 않습니다.',
                '',
                '```text',
                summary.slice(0, 20000),
                '```',
                '',
                `전체 로그: ${runUrl}`,
              ].join('\n');
            } else {
              // plan 실패: 오류 텍스트에 민감정보가 섞일 수 있어 게시하지 않는다.
              body = [
                `### Terraform Plan — ⚠️ plan ${outcome}`,
                '',
                `plan이 실패했습니다. 오류 원문은 공개하지 않으며 Actions 로그에서 확인하세요.`,
                '',
                `전체 로그: ${runUrl}`,
              ].join('\n');
            }
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: plan 실패 처리
        if: steps.plan.outcome != 'success'
        run: exit 1
