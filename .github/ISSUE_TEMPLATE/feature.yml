name: Feature
description: GCP 인프라, IaC, GitHub 자동화 추가 또는 개선 작업을 제안합니다.
title: "[FEAT] "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Feature issue는 GCP 인프라 또는 운영 자동화 변경의 출발점입니다. PR은 이 issue의 완료 조건을 만족하도록 작게 나누어 주세요.

  - type: textarea
    id: purpose
    attributes:
      label: 목적
      description: 이 인프라 변경이 왜 필요한지, 어떤 운영 문제를 해결하는지 설명해 주세요.
      placeholder: 예) 일일 배치 실행을 위해 Cloud Run Job과 Scheduler 인프라를 추가합니다.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      description: 이번 issue에서 할 일을 체크리스트로 적어 주세요.
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 영향받는 컴포넌트
      multiple: true
      options:
        - Terraform / IaC
        - GCP Project / IAM
        - Secret Manager
        - Artifact Registry
        - Cloud Run / Cloud Run Jobs
        - Cloud Scheduler
        - GCS
        - BigQuery
        - Logging / Monitoring
        - GitHub Actions / CI-CD
        - GitHub 협업 설정
        - 운영 문서
        - 기타
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: 완료 조건
      description: 이 issue가 끝났다고 판단할 수 있는 기준을 적어 주세요.
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 참고 사항
      description: 관련 링크, 설계 메모, 비용/권한/리전/롤백 제약 조건이 있으면 적어 주세요.
    validations:
      required: false
