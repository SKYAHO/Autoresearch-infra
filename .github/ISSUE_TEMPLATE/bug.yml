name: Bug
description: GCP 인프라, IaC, workflow, 권한 오류를 보고합니다.
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그는 재현 가능한 정보가 가장 중요합니다. 가능하면 같은 절차로 다시 발생시킬 수 있게 작성해 주세요.

  - type: textarea
    id: summary
    attributes:
      label: 현상
      description: 어떤 문제가 발생했는지 간략히 설명해 주세요.
      placeholder: 예) Cloud Run Job 배포 workflow가 Secret Manager 권한 오류로 실패합니다.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 문제를 다시 확인할 수 있는 절차를 순서대로 적어 주세요.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 정상적으로 동작했다면 어떤 결과가 나와야 하나요?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제로 관찰한 결과를 적어 주세요.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 영향받는 컴포넌트
      multiple: true
      options:
        - Terraform / IaC
        - GCP Project / IAM
        - Secret Manager
        - Artifact Registry
        - Cloud Run / Cloud Run Jobs
        - Cloud Scheduler
        - GCS
        - BigQuery
        - Logging / Monitoring
        - GitHub Actions / CI-CD
        - GitHub 협업 설정
        - 운영 문서
        - 기타
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 실행 환경
      description: 브랜치, GCP 프로젝트/리전, workflow run, 관련 설정을 적어 주세요.
      value: |
        - Branch:
        - GCP project:
        - Region:
        - Event:
        - Workflow run:
        - Related setting:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 로그
      description: 에러 메시지나 관련 로그를 붙여 주세요.
      render: shell
    validations:
      required: false
